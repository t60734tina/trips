<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小象愛出門 — 行程分享</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 0 auto; padding: 16px; background: #f5f5f5; }
  h1 { color: #2d6a4f; font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
  .item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .time { font-size: 13px; color: #999; }
  .name { font-size: 17px; font-weight: bold; margin: 4px 0; }
  .info { font-size: 13px; color: #555; }
  .tag { display: inline-block; background: #2d6a4f; color: white; border-radius: 6px; padding: 2px 8px; font-size: 12px; float: right; }
  .map-btn { display: block; margin-top: 10px; text-align: center; background: #4285f4; color: white; border-radius: 8px; padding: 8px; text-decoration: none; font-size: 14px; }
  .footer { text-align: center; color: #aaa; font-size: 12px; margin-top: 24px; }
</style>
</head>
<body>
  <h1>小象愛出門行程</h1>
  <p class="subtitle">這是測試頁面，正式行程即將上線</p>
  <div class="item">
    <span class="time">09:00</span>
    <span class="tag">早餐</span>
    <div class="name">車庫小籠包</div>
    <div class="info">05:00–13:00（週一公休）</div>
    <a class="map-btn" href="https://maps.google.com/?q=三芝車庫小籠包" target="_blank">📍 開啟地圖</a>
  </div>
  <div class="footer">小象愛出門 ElephantGoGo</div>
</body>
</html>
